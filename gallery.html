<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>차트 이미지 모음</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Segoe UI, Arial, sans-serif;
      background: #111;
      color: #eee;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #111;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 650;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .empty {
      color: #aaa;
      border: 1px dashed #444;
      border-radius: 8px;
      padding: 16px;
    }
    .card {
      border: 1px solid #333;
      background: #181818;
      border-radius: 8px;
      overflow: hidden;
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #050505;
    }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 12px;
      color: #ccc;
      font-size: 13px;
    }
    .meta strong {
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>차트 이미지 모음</h1>
  <main class="grid">
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_212424.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 21:24:24</span>
      </div>
    </article>
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_212730.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 21:27:30</span>
      </div>
    </article>
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_232323.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 23:23:23</span>
      </div>
    </article>
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_232745.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 23:27:45</span>
      </div>
    </article>
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_234637.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 23:46:37</span>
      </div>
    </article>
    <article class="card">
      <img src="assets/2026-05-25/kospi_daily_20260525_234718.png" alt="kospi daily chart">
      <div class="meta">
        <strong>kospi</strong>
        <span>daily</span>
        <span>2026-05-25 23:47:18</span>
      </div>
    </article>
<!-- CHART_CARDS -->
  </main>
</body>
</html>
